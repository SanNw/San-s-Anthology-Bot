name: Publicar artigos do Substack no Telegram

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: telegram-substack-bot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SUBSTACK_RSS_URL: ${{ secrets.SUBSTACK_RSS_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: python bot.py

      - name: Commit e push do estado (posted.json, subscribers.json, update_offset.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in posted.json subscribers.json update_offset.json; do
            [ -f "$f" ] && git add -f "$f"
          done
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza estado do bot [skip ci]"
            git push
          else
            echo "Nenhuma mudança de estado para commitar."
          fi
